name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  all-tests:
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-572337278115-ap-southeast-2
      PULUMI_STACK: staging
      PULUMI_CONFIG_PASSPHRASE: ''
      PERSISTENCE: development
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STATIC_BASE_URL: 'https://d2uoxssv1ey7em.cloudfront.net'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

  detect-changes:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      hutch: ${{ steps.detect.outputs.hutch }}
      firefox-extension: ${{ steps.detect.outputs.firefox-extension }}
      chrome-extension: ${{ steps.detect.outputs.chrome-extension }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: detect
        run: |
          AFFECTED=$(NX_BASE=${{ github.event.before }} NX_HEAD=${{ github.sha }} pnpm nx show projects --affected --json)
          echo "Affected projects: $AFFECTED"
          echo "hutch=$(echo "$AFFECTED" | jq 'any(. == "hutch")')" >> "$GITHUB_OUTPUT"
          echo "firefox-extension=$(echo "$AFFECTED" | jq 'any(. == "firefox-extension")')" >> "$GITHUB_OUTPUT"
          echo "chrome-extension=$(echo "$AFFECTED" | jq 'any(. == "chrome-extension")')" >> "$GITHUB_OUTPUT"

  deploy-staging:
    if: needs.detect-changes.outputs.hutch == 'true'
    needs: [all-tests, detect-changes]
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-572337278115-ap-southeast-2
      PULUMI_STACK: staging
      PULUMI_CONFIG_PASSPHRASE: ''
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx nx compile hutch

      - run: PULUMI_CONFIG_PASSPHRASE='' pulumi up --stack "$PULUMI_STACK" --yes
        working-directory: projects/hutch

  post-deploy-staging:
    if: needs.detect-changes.outputs.hutch == 'true'
    needs: [all-tests, detect-changes, deploy-staging]
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-572337278115-ap-southeast-2
      PULUMI_CONFIG_PASSPHRASE: ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get staging URL from Pulumi outputs
        id: staging-url
        run: |
          RAW_URL=$(pulumi stack output apiUrl --stack staging)
          STAGING_URL="${RAW_URL%/\$default}"
          echo "url=$STAGING_URL" >> "$GITHUB_OUTPUT"
        working-directory: projects/hutch

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: projects/hutch

      - name: Verify staging is reachable
        run: |
          echo "Staging URL: ${{ steps.staging-url.outputs.url }}"
          curl --fail --silent --show-error --max-time 30 "${{ steps.staging-url.outputs.url }}" | head -50

      - name: Run E2E tests against staging
        run: STAGING_URL=${{ steps.staging-url.outputs.url }} pnpm test:e2e:staging
        working-directory: projects/hutch

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-staging-results
          path: projects/hutch/test-results-staging/
          retention-days: 7

  deploy-prod:
    if: needs.detect-changes.outputs.hutch == 'true'
    needs: [all-tests, detect-changes, deploy-staging, post-deploy-staging]
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-278728209435-ap-southeast-2
      PULUMI_STACK: prod
      PULUMI_CONFIG_PASSPHRASE: ''
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx nx compile hutch

      - run: PULUMI_CONFIG_PASSPHRASE='' pulumi up --stack "$PULUMI_STACK" --yes
        working-directory: projects/hutch

  ff-extension-deploy-to-prod:
    if: needs.detect-changes.outputs.firefox-extension == 'true'
    needs: [all-tests, detect-changes]
    permissions:
      contents: write
    uses: ./.github/workflows/submit-ff-extension-for-signing.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

  chrome-extension-deploy-to-prod:
    if: needs.detect-changes.outputs.chrome-extension == 'true'
    needs: [all-tests, detect-changes]
    permissions:
      contents: write
    uses: ./.github/workflows/publish-chrome-extension.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
