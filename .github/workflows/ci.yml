name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  all-tests:
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-572337278115-ap-southeast-2
      PULUMI_STACK: staging
      PULUMI_CONFIG_PASSPHRASE: ''
      PERSISTENCE: development
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STATIC_BASE_URL: 'https://d2uoxssv1ey7em.cloudfront.net'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

  detect-projects:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      platform-affected: ${{ steps.detect.outputs.platform-affected }}
      non-platform-projects: ${{ steps.detect.outputs.non-platform-projects }}
      has-non-platform: ${{ steps.detect.outputs.has-non-platform }}
      ff-affected: ${{ steps.detect.outputs.ff-affected }}
      chrome-affected: ${{ steps.detect.outputs.chrome-affected }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: detect
        run: |
          AFFECTED=$(pnpm nx show projects --affected --json)
          echo "Affected projects: $AFFECTED"

          DEPLOYABLE=$(pnpm nx show projects --with-target deploy --json)
          PROJECTS=$(echo "$AFFECTED" "$DEPLOYABLE" | jq -s '.[0] as $a | .[1] | map(select(. as $p | $a | index($p)))')
          NON_PLATFORM=$(echo "$PROJECTS" | jq -c '[.[] | select(. != "platform")]')

          echo "Deployable affected: $PROJECTS"
          echo "Non-platform: $NON_PLATFORM"

          echo "platform-affected=$(echo "$PROJECTS" | jq -e 'index("platform")' > /dev/null 2>&1 && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "non-platform-projects=$NON_PLATFORM" >> "$GITHUB_OUTPUT"
          echo "has-non-platform=$(echo "$NON_PLATFORM" | jq -e 'length > 0' > /dev/null 2>&1 && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "ff-affected=$(echo "$PROJECTS" | jq -e 'index("firefox-extension")' > /dev/null 2>&1 && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "chrome-affected=$(echo "$PROJECTS" | jq -e 'index("chrome-extension")' > /dev/null 2>&1 && echo true || echo false)" >> "$GITHUB_OUTPUT"

  deploy-platform:
    if: needs.detect-projects.outputs.platform-affected == 'true'
    needs: [all-tests, detect-projects]
    uses: ./.github/workflows/project-deployment.yaml
    secrets: inherit
    with:
      project: platform

  pipeline:
    name: ${{ matrix.project }}
    if: needs.detect-projects.outputs.has-non-platform == 'true'
    needs: [all-tests, detect-projects, deploy-platform]
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-projects.outputs.non-platform-projects) }}
    uses: ./.github/workflows/project-deployment.yaml
    secrets: inherit
    with:
      project: ${{ matrix.project }}

  ff-extension-publish:
    if: needs.detect-projects.outputs.ff-affected == 'true'
    needs: [detect-projects, pipeline]
    permissions:
      contents: write
    uses: ./.github/workflows/submit-ff-extension-for-signing.yml
    secrets: inherit

  chrome-extension-publish:
    if: needs.detect-projects.outputs.chrome-affected == 'true'
    needs: [detect-projects, pipeline]
    permissions:
      contents: write
    uses: ./.github/workflows/publish-chrome-extension.yml
    secrets: inherit
