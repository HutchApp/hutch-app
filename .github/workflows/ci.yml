name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-278728209435-ap-southeast-2
      PULUMI_CONFIG_PASSPHRASE: ''
      PERSISTENCE: development
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

  detect-changes:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      hutch: ${{ steps.detect.outputs.hutch }}
      firefox-extension: ${{ steps.detect.outputs.firefox-extension }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - id: detect
        run: |
          AFFECTED=$(pnpm nx show projects --affected --json)
          echo "Affected projects: $AFFECTED"
          echo "hutch=$(echo "$AFFECTED" | jq 'any(. == "hutch")')" >> "$GITHUB_OUTPUT"
          echo "firefox-extension=$(echo "$AFFECTED" | jq 'any(. == "firefox-extension")')" >> "$GITHUB_OUTPUT"

  hutch-deploy-to-prod:
    if: needs.detect-changes.outputs.hutch == 'true'
    needs: [check, detect-changes]
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-278728209435-ap-southeast-2
      PULUMI_CONFIG_PASSPHRASE: ''
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx nx compile hutch

      - run: PULUMI_CONFIG_PASSPHRASE='' pulumi up --stack prod --yes
        working-directory: projects/hutch

  # Commenting the Firefox extension deploy to prod due to every submission making my signing review go back to the end of the queue
