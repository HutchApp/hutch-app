name: Crawler source health

on:
  schedule:
    - cron: '0 19 * * *'    # 06:00 AEST daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run crawler source health canary
        run: pnpm nx run @packages/crawl-article:check-sources
