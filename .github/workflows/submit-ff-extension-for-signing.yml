name: Submit FF Extension for Signing

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AMO_JWT_ISSUER:
        required: true
      AMO_JWT_SECRET:
        required: true

jobs:
  submit-firefox-extension-prod:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-278728209435-ap-southeast-2
      PULUMI_CONFIG_PASSPHRASE: ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy extension bucket infrastructure
        run: pulumi up --stack prod --yes
        working-directory: projects/extensions/firefox-extension

      - name: Compile bump-version script
        run: pnpm --filter firefox-extension exec tsc --outDir dist --rootDir src --module commonjs --esModuleInterop --skipLibCheck src/bump-version.ts

      - name: Bump extension version
        run: node projects/extensions/firefox-extension/scripts/bump-version.js patch

      - name: Build and package extension
        run: npx nx run-many --target=compile --projects=browser-extension-core,firefox-extension

      - name: Commit and push bumped version to main
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/extensions/firefox-extension/package.json projects/extensions/firefox-extension/src/runtime/manifest.json
          git commit -m "chore: bump firefox extension version to $(node -p "require('./projects/extensions/firefox-extension/package.json').version")"
          git pull --rebase origin main
          git push origin main

      - name: Create source code archive for AMO review
        run: |
          zip -r /tmp/extension-source.zip \
            projects/extensions/firefox-extension/src/ \
            projects/extensions/firefox-extension/scripts/build-extension.js \
            projects/extensions/firefox-extension/package.json \
            projects/extensions/firefox-extension/tsconfig.json \
            projects/browser-extension-core/src/ \
            projects/browser-extension-core/package.json \
            projects/browser-extension-core/tsconfig.json \
            projects/hutch-logger/src/ \
            projects/hutch-logger/package.json \
            projects/hutch-logger/tsconfig.json \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml

      - name: Submit extension to AMO for signing
        run: npx nx run firefox-extension:sign
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
