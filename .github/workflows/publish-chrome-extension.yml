name: Publish Chrome Extension

on:
  workflow_call:
    secrets:
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
      GOOGLE_REFRESH_TOKEN:
        required: true
      CHROME_EXTENSION_ID:
        required: true

jobs:
  publish-chrome-extension-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compile bump-version script
        run: pnpm --filter chrome-extension exec tsc --outDir dist --rootDir src --module commonjs --esModuleInterop --skipLibCheck src/bump-version.ts

      - name: Bump extension version
        run: node projects/extensions/chrome-extension/scripts/bump-version.js patch

      - name: Build and package extension
        run: npx nx run-many --target=compile --projects=browser-extension-core,chrome-extension

      - name: Commit and push bumped version to main
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/extensions/chrome-extension/package.json projects/extensions/chrome-extension/src/runtime/manifest.json
          git commit -m "chore: bump chrome extension version to $(node -p "require('./projects/extensions/chrome-extension/package.json').version")"
          git pull --rebase origin main
          git push origin main

      - name: Submit to Chrome Web Store
        run: node projects/extensions/chrome-extension/scripts/submit-to-chrome-web-store.js
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
