name: Publish Chrome Extension

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      GOOGLE_CLIENT_ID:
        required: false
      GOOGLE_CLIENT_SECRET:
        required: false
      GOOGLE_REFRESH_TOKEN:
        required: false
      CHROME_EXTENSION_ID:
        required: false

jobs:
  publish-chrome-extension-prod:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-2
      PULUMI_BACKEND_URL: s3://hutch-pulumi-state-278728209435-ap-southeast-2
      PULUMI_CONFIG_PASSPHRASE: ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy extension bucket infrastructure
        run: pulumi up --stack prod --yes
        working-directory: projects/chrome-extension

      - name: Compile bump-version script
        run: pnpm --filter chrome-extension exec tsc --outDir dist --rootDir src --module commonjs --esModuleInterop --skipLibCheck src/bump-version.ts

      - name: Bump extension version
        run: node projects/chrome-extension/scripts/bump-version.js patch

      - name: Build and package extension
        run: npx nx run-many --target=compile --projects=browser-extension-core,chrome-extension

      - name: Commit and push bumped version to main
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/chrome-extension/package.json projects/chrome-extension/src/runtime/manifest.json
          git commit -m "chore: bump chrome extension version to $(node -p "require('./projects/chrome-extension/package.json').version")"
          git push origin main

      - name: Publish to S3
        run: node projects/chrome-extension/scripts/publish-to-s3.js

      # Uncomment once GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN, and CHROME_EXTENSION_ID secrets are configured
      # - name: Submit to Chrome Web Store
      #   run: node projects/chrome-extension/scripts/submit-to-chrome-web-store.js
      #   env:
      #     GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      #     GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      #     GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      #     CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
