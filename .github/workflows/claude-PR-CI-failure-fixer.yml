name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  # ┌─────────────────────────────────────────────────────────────────┐
  # │ CI PASSED: Reset the fix attempt counter                       │
  # └─────────────────────────────────────────────────────────────────┘
  reset-counter:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Remove ci-fix-attempt label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.workflow_run.head_branch;

            const { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${branch}`
            });

            if (pulls.length === 0) return;

            const label = pulls[0].labels.find(l => l.name.startsWith('ci-fix-attempt-'));
            if (label) {
              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: pulls[0].number,
                name: label.name
              }).catch(() => {});
            }

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ CI FAILED: Post @claude comment to request fix (up to 5 times) │
  # └─────────────────────────────────────────────────────────────────┘
  request-fix:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Check if we should attempt a fix and post @claude comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const MAX_ATTEMPTS = 5;
            const { owner, repo } = context.repo;
            const branch = context.payload.workflow_run.head_branch;
            const runId = context.payload.workflow_run.id;

            // Find the PR
            const { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${branch}`
            });

            if (pulls.length === 0 || pulls[0].base.ref !== 'main') {
              console.log('No open PR targeting main found');
              return;
            }

            const pr = pulls[0];
            const label = pr.labels.find(l => l.name.startsWith('ci-fix-attempt-'));
            const attempt = label ? parseInt(label.name.replace('ci-fix-attempt-', ''), 10) : 0;

            // Bail if max attempts reached
            if (attempt >= MAX_ATTEMPTS) {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: pr.number, per_page: 20
              });

              if (!comments.some(c => c.body.includes('CI fix limit reached'))) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr.number,
                  body: `🛑 **CI fix limit reached**: Maximum of ${MAX_ATTEMPTS} automated fix attempts exceeded.\n\nManual intervention required.\n\ncc @FagnerMartinsBrack`
                });
              }
              return;
            }

            // Update attempt label
            const newAttempt = attempt + 1;
            if (label) {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: pr.number, name: label.name
              }).catch(() => {});
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr.number,
              labels: [`ci-fix-attempt-${newAttempt}`]
            });

            // Get failure summary
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId
            });

            const failedSummary = jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => `- ${j.name}: ${j.steps?.filter(s => s.conclusion === 'failure').map(s => s.name).join(', ') || 'unknown step'}`)
              .join('\n') || 'No details available';

            // Post @claude comment with minimal context - instructions are in .md file
            const prompt = [
              '@claude CI has FAILED. Use your Read tool to read the local file `.github/workflows/claude-PR-CI-failure-fixer.md` for instructions. The file is in the checked-out repository.',
              '',
              '## Context',
              `- **Attempt**: ${newAttempt} of ${MAX_ATTEMPTS}`,
              `- **Run ID**: ${runId}`,
              `- **PR**: #${pr.number}`,
              `- **Branch**: ${pr.head.ref}`,
              '',
              '## Failed Jobs',
              failedSummary,
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: pr.number,
              body: prompt
            });

            console.log(`Posted @claude fix request for PR #${pr.number} (attempt ${newAttempt})`);
