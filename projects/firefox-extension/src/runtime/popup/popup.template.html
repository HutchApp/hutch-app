<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.styles.css">
</head>
<body>
  <div id="login-view" class="view" hidden>
    <div class="login">
      <div class="login__brand">
        <a href="https://hutch-app.com/?utm=ff-ext" class="login__logo-link" aria-label="Visit Hutch website" target="_blank" rel="noopener">
          <div class="login__icon" aria-hidden="true">H</div>
        </a>
        <h2 class="login__heading">Log in to Hutch</h2>
      </div>
      <form id="login-form" class="login__form">
        <div class="login__field">
          <label class="login__label" for="email">Email</label>
          <input class="login__input" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="login__field">
          <label class="login__label" for="password">Password</label>
          <input class="login__input" type="password" id="password" required>
        </div>
        <button class="login__submit" type="submit">Log in</button>
      </form>
      <p id="login-error" class="login__error" hidden>Invalid credentials. Try again?</p>
    </div>
  </div>

  <div id="saved-view" class="view" hidden>
    <p>Saved!</p>
    <button id="undo-button" class="button--secondary">Undo</button>
  </div>

  <div id="already-saved-view" class="view" hidden>
    <p>Already in your list</p>
  </div>

  <div id="removed-view" class="view" hidden>
    <p>Removed</p>
  </div>

  <div id="list-view" class="view" hidden>
    <div class="list-view__header">
      <h2 class="list-view__title">My List</h2>
      <div class="list-view__actions">
        <button id="reload-button" class="list-view__reload" title="Reload">&#x21bb;</button>
        <button id="logout-button" class="list-view__logout" title="Log out">Log out</button>
      </div>
    </div>
    <input
      type="text"
      id="filter-input"
      class="list-view__filter"
      placeholder="Filter by URL..."
    >
    <div id="link-list" class="list-view__links"></div>
    <p id="empty-list" class="list-view__empty" hidden>No saved links</p>
    <p id="no-matches" class="list-view__empty" hidden>No matching links</p>
    <p id="list-error" class="list-view__error" hidden>Failed to load links</p>
  </div>

  <div id="loading-view" class="view">
    <p>Loading...</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
