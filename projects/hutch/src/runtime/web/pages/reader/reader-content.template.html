    <div class="reader__header">
      <a class="reader__back" href="/queue" data-test-back-link>← Back to queue</a>
      <h1 class="reader__title" data-test-reader-title>{{title}}</h1>
      <div class="reader__meta">
        <span data-test-reader-site>{{siteName}}</span>
        <span>{{estimatedReadTime}} min read</span>
      </div>
      <a class="reader__original-link" href="{{url}}" target="_blank" rel="noopener" data-test-original-link>View original</a>
    </div>
    {{#if summary}}
    <details class="reader__summary" data-test-reader-summary>
      <summary class="reader__summary-toggle">TL;DR</summary>
      <pre class="reader__summary-text">{{summary}}</pre>
    </details>
    {{/if}}
    {{#if audioEnabled}}
    <div class="reader__audio-player" data-test-audio-player>
      <audio controls preload="metadata" src="{{staticBaseUrl}}/sample-audio.opus" data-audio-element>
      </audio>
    </div>
    {{/if}}
    <div class="reader__content" data-test-reader-content>
      {{{content}}}
    </div>
