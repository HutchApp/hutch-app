    <main class="view">
      <nav class="view__topbar">
        <a class="view__logo" href="/" data-test-view-logo>Readplace</a>
      </nav>
      <article class="view__body">
        {{{innerContent}}}
      </article>
    </main>
    <aside class="view__cta" data-test-view-cta>
      <form class="view__save-form" method="GET" action="/save" data-test-view-save>
        <input type="hidden" name="url" value="{{articleUrl}}">
        {{#each utmParams}}<input type="hidden" name="{{key}}" value="{{value}}">
        {{/each}}
        <button type="submit" class="view__save-btn">Save to My Queue</button>
      </form>
    </aside>
