    <main class="auth-page">
      <div class="auth-card">
        <h1 class="auth-card__title">Reset your password</h1>
        <p class="auth-card__subtitle">Enter your email and we'll send you a reset link</p>
        {{#if globalError}}<div class="auth-form__global-error" data-test-global-error>{{globalError}}</div>{{/if}}
        {{#if success}}
          <div class="auth-form__success" data-test-success>Check your email for a link to reset your password.</div>
        {{else}}
          <form class="auth-form" method="POST" action="/forgot-password" data-test-form="forgot-password">
            <div class="auth-form__field">
              <label class="auth-form__label" for="email">Email</label>
              <input class="auth-form__input{{emailField.errorClass}}" type="email" id="email" name="email" value="{{email}}" required autocomplete="email">
              {{#if emailField.error}}<p class="auth-form__error" data-test-error="email">{{emailField.error}}</p>{{/if}}
            </div>
            <button class="auth-form__submit" type="submit">Send reset link</button>
          </form>
        {{/if}}
        <p class="auth-card__footer">
          Remember your password? <a href="/login">Sign in</a>
        </p>
      </div>
    </main>
